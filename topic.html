<!DOCTYPE html>
<html>
<head>
    <title>Topic Articles</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 id="topic-title">Loading...</h1>

<div id="articles-container"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
    getFirestore,
    collection,
    query,
    where,
    getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "rethinkers-journal.firebaseapp.com",
  projectId: "rethinkers-journal",
  storageBucket: "rethinkers-journal.appspot.com",
  messagingSenderId: "842949343385",
  appId: "1:842949343385:web:adc684cddcdad6f4d72008"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const topic = params.get("topic");

document.getElementById("topic-title").textContent = topic;

const q = query(
    collection(db, "articles"),
    where("topic", "==", topic)
);

const snapshot = await getDocs(q);

const container = document.getElementById("articles-container");

snapshot.forEach((doc) => {

    const data = doc.data();

    container.innerHTML += `
        <div class="card">
            <h2>${data.title}</h2>
            <p>${data.content}</p>
            <small>${data.author}</small>
        </div>
    `;
});

</script>

</body>
</html>
