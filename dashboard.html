<!DOCTYPE html>
<html>
<head>
<title>Dashboard - Rethinkers</title>

<style>
:root {
    --bg-color: #f4f7f6;
    --text-color: #2c3e50;
    --accent-color: #27ae60;
    --card-bg: #ffffff;
    --border-color: #e0e0e0;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background-color: var(--bg-color);
    color: var(--text-color);
}

/* HEADER */
header {
    background-color: var(--card-bg);
    border-bottom: 2px solid var(--accent-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 25px;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.left {
    font-size: 20px;
    font-weight: bold;
}

.right {
    display: flex;
    align-items: center;
    gap: 10px;
}

/* BUTTONS */
button, a {
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    text-decoration: none;
    font-weight: bold;
}

.login {
    background: var(--accent-color);
    color: white;
}

.post {
    background: #2980b9;
    color: white;
}

.logout {
    background: #e74c3c;
    color: white;
}

/* AVATAR */
.avatar {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    background: #2c3e50;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

/* CONTENT */
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

h2, h3 {
    color: var(--text-color);
}

.card {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.03);
}

.tag {
    display: inline-block;
    background: #e8f6e8;
    color: var(--accent-color);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: bold;
}

form input, form textarea, form select {
    width: 100%;
    margin: 5px 0;
    padding: 10px;
    border-radius: 5px;
    border: 1px solid var(--border-color);
    background: #fafafa;
}

form input:focus,
form textarea:focus,
form select:focus {
    outline: none;
    border-color: var(--accent-color);
    background: white;
}

form button {
    background: var(--accent-color);
    color: white;
    margin-top: 10px;
}

hr {
    border: none;
    border-top: 1px solid var(--border-color);
    margin: 20px 0;
}
</style>
</head>

<body>

<header>
    <div class="left">Rethinkers Dashboard</div>

    <div class="right">
        <a href="login.html" class="login" id="loginBtn">Login</a>
        <button class="post" id="postBtn" style="display:none;">Post</button>
        <div class="avatar" id="avatar" style="display:none;"></div>
        <button class="logout" id="logoutBtn" style="display:none;">Logout</button>
    </div>
</header>

<div class="container">

    <h2>Science. Logic. Action.</h2>
    <p>An analytical platform for thinkers and builders.</p>

    <hr>

    <!-- POST FORM -->
    <div id="publish">
        <h3>Create Post</h3>

        <form id="submission-form">
            <select id="sub-category" required>
                <option value="Research">Research</option>
                <option value="Opinion">Opinion</option>
                <option value="Field Report">Field Report</option>
            </select>

            <input type="text" id="sub-author" placeholder="Author Name" required>
            <input type="text" id="sub-title" placeholder="Title" required>
            <textarea id="sub-content" placeholder="Write your post..." required></textarea>

            <button type="submit">Publish</button>
        </form>
    </div>

    <hr>

    <!-- POSTS -->
    <h3>Live Posts</h3>
    <div id="articles-container"></div>

</div>


<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyADuJpYlXLuX8dfmX2KSnlO0KJiqQ8Ba80",
  authDomain: "rethinkers-journal.firebaseapp.com",
  projectId: "rethinkers-journal",
  storageBucket: "rethinkers-journal.firebasestorage.app",
  messagingSenderId: "842949343385",
  appId: "1:842949343385:web:adc684cddcdad6f4d72008"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


// UI
const loginBtn = document.getElementById("loginBtn");
const postBtn = document.getElementById("postBtn");
const avatar = document.getElementById("avatar");
const logoutBtn = document.getElementById("logoutBtn");
const articlesContainer = document.getElementById("articles-container");

let currentUser = null;


// AUTH
onAuthStateChanged(auth, (user) => {
    if (user) {
        currentUser = user;

        loginBtn.style.display = "none";
        postBtn.style.display = "inline-block";
        logoutBtn.style.display = "inline-block";

        avatar.style.display = "flex";
        avatar.textContent = user.email.charAt(0).toUpperCase();
    } else {
        currentUser = null;

        loginBtn.style.display = "inline-block";
        postBtn.style.display = "none";
        logoutBtn.style.display = "none";

        avatar.style.display = "none";
    }
});


// LOGOUT
logoutBtn.onclick = () => signOut(auth);


// SCROLL TO POST
postBtn.onclick = () => {
    document.getElementById("publish").scrollIntoView({ behavior: "smooth" });
};


// SUBMIT POST
document.getElementById("submission-form").addEventListener("submit", async (e) => {
    e.preventDefault();

    if (!currentUser) {
        alert("Please login first");
        return;
    }

    const category = sub-category.value;
    const author = sub-author.value;
    const title = sub-title.value;
    const content = sub-content.value;

    await addDoc(collection(db, "posts"), {
        category,
        author,
        title,
        content,
        email: currentUser.email,
        time: Date.now()
    });

    e.target.reset();
});


// LOAD POSTS
const q = query(collection(db, "posts"), orderBy("time", "desc"));

onSnapshot(q, (snapshot) => {
    articlesContainer.innerHTML = "";

    snapshot.forEach((doc) => {
        const data = doc.data();

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <span class="tag">${data.category}</span>
            <h4>${data.title}</h4>
            <p>${data.content}</p>
            <small>By ${data.author} | ${data.email}</small>
        `;

        articlesContainer.appendChild(div);
    });
});

</script>

</body>
</html>
