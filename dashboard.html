<!DOCTYPE html>
<html>
<head>
<title>Dashboard - Rethinkers</title>

<style>
:root {
    --bg-color: #f4f7f6;
    --text-color: #2c3e50;
    --accent-color: #27ae60;
    --card-bg: #ffffff;
    --border-color: #e0e0e0;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: Arial;
}

body {
    background: var(--bg-color);
    color: var(--text-color);
}

/* HEADER */
header {
    background: white;
    border-bottom: 2px solid var(--accent-color);
    display: flex;
    justify-content: space-between;
    padding: 15px;
    position: sticky;
    top: 0;
}

.left {
    font-weight: bold;
}

.right {
    display: flex;
    gap: 10px;
    align-items: center;
}

button, a {
    padding: 8px 12px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    text-decoration: none;
}

.login { background: var(--accent-color); color: white; }
.post { background: #2980b9; color: white; }
.logout { background: red; color: white; }

.avatar {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    background: #333;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* MAIN */
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    margin-top: 15px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

.tag {
    background: #e8f6e8;
    color: var(--accent-color);
    padding: 3px 8px;
    border-radius: 5px;
    font-size: 12px;
}

form input, form textarea, form select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
}

form button {
    margin-top: 10px;
    background: var(--accent-color);
    color: white;
}
</style>
</head>

<body>

<header>
    <div class="left">Rethinkers Dashboard</div>

    <div class="right">
        <a href="login.html" class="login" id="loginBtn">Login</a>
        <button class="post" id="postBtn" style="display:none;">Post</button>
        <div class="avatar" id="avatar" style="display:none;"></div>
        <button class="logout" id="logoutBtn" style="display:none;">Logout</button>
    </div>
</header>

<div class="container">

    <h2>Science. Logic. Action.</h2>
    <p>Live community posts below</p>

    <hr>

    <div id="publish">
        <h3>Create Post</h3>

        <form id="submission-form">
            <select id="sub-category">
                <option>Research</option>
                <option>Opinion</option>
                <option>Field Report</option>
            </select>

            <input id="sub-author" placeholder="Author Name">
            <input id="sub-title" placeholder="Title">
            <textarea id="sub-content" placeholder="Write..."></textarea>

            <button type="submit">Publish</button>
        </form>
    </div>

    <hr>

    <h3>Live Posts</h3>
    <div id="articles-container"></div>

</div>

<!-- IMPORTANT -->
<script type="module" src="app.js"></script>

</body>
</html>
